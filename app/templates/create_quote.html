{% extends "base.html" %}
{% block content %}
<h2>Create Quote</h2>
<form method="post" action="/quotes/create" id="quote-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>Client *</label><br>
    <input list="clients_list" id="client_input" placeholder="Type client name..." required style="width:100%; padding:8px; margin:5px 0;">
    <datalist id="clients_list">
        {% for client in clients %}
            <option value="{{ client.name }}" data-id="{{ client.id }}"></option>
        {% endfor %}
    </datalist>
    <input type="hidden" name="client_id" id="client_id">
    <br><br>
    <h3>Items</h3>
    <div class="table-wrapper">
        <table id="items-table" style="width:100%; border-collapse: collapse;">
            <tr style="background:#49bef5; color:rgb(58, 57, 57);">
                <th style="border:1px solid #ddd; padding:8px;">Service</th>
                <th style="border:1px solid #ddd; padding:8px;">Description</th>
                <th style="border:1px solid #ddd; padding:8px;">Unit Cost</th>
                <th style="border:1px solid #ddd; padding:8px;">Quantity</th>
                <th style="border:1px solid #ddd; padding:8px;">Amount</th>
                <th style="border:1px solid #ddd; padding:8px;"></th>
            </tr>
        </table>
    </div>
    <br>
    <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button type="button" onclick="addRow()" style="background:#1e3a8a; color:white; padding:8px 16px; border:none; border-radius:6px; cursor:pointer;">+ Add from Services</button>
        <button type="button" onclick="addCustomRow()" style="background:#6c757d; color:white; padding:8px 16px; border:none; border-radius:6px; cursor:pointer;">+ Add Custom Item</button>
    </div>
    <br><br>
    <h3>Total: R <span id="grand-total" style="color:#047857;">0.00</span></h3>
    <input type="hidden" name="items_data" id="items_data">
    <br>
    <button type="submit" onclick="return validateAndSubmit()" style="background:#047857; color:white; padding:10px 30px; border:none; border-radius:6px; cursor:pointer; font-size:16px;">Save Quote</button>
    <a href="/quotes-page" style="margin-left:15px; color:#666; text-decoration:none;">Cancel</a>
</form>

<script>
document.getElementById("client_input").addEventListener("input", function() {
    let input = this.value;
    let options = document.querySelectorAll("#clients_list option");
    let hiddenInput = document.getElementById("client_id");
    hiddenInput.value = "";
    options.forEach(option => {
        if (option.value === input) {
            hiddenInput.value = option.getAttribute("data-id");
        }
    });
});

function addRow() {
    const table = document.getElementById("items-table");
    const row = table.insertRow();
    row.insertCell(0).innerHTML = `<select class="service-select" style="width:100%; padding:5px;" onchange="fillService(this)"><option value="">Select Service</option>{% for service in services %}<option value="{{ service.price }}" data-desc="{{ service.description }}">{{ service.name }} (R {{ "%.2f"|format(service.price) }})</option>{% endfor %}</select>`;
    row.insertCell(1).innerHTML = `<input type="text" class="description-input" required style="width:100%; padding:5px;">`;
    row.insertCell(2).innerHTML = `<input type="number" step="0.01" class="unit-cost" required style="width:100%; padding:5px;">`;
    row.insertCell(3).innerHTML = `<input type="number" class="quantity" value="1" min="1" required style="width:100%; padding:5px;">`;
    let amountCell = row.insertCell(4);
    amountCell.innerHTML = `0.00`;
    amountCell.classList.add("amount");
    amountCell.style.textAlign = "right";
    amountCell.style.fontWeight = "bold";
    row.insertCell(5).innerHTML = `<button type="button" onclick="removeRow(this)" style="background:#dc3545; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">X</button>`;
    attachEvents(row);
}

function addCustomRow() {
    const table = document.getElementById("items-table");
    const row = table.insertRow();
    // Empty cell for service (shows "Custom" or just "-")
    row.insertCell(0).innerHTML = `<span style="color:#666; font-style:italic; padding:5px;">Custom</span>`;
    row.insertCell(1).innerHTML = `<input type="text" class="description-input" placeholder="Enter description (e.g., Transport)" required style="width:100%; padding:5px;">`;
    row.insertCell(2).innerHTML = `<input type="number" step="0.01" class="unit-cost" placeholder="0.00" required style="width:100%; padding:5px;">`;
    row.insertCell(3).innerHTML = `<input type="number" class="quantity" value="1" min="1" required style="width:100%; padding:5px;">`;
    let amountCell = row.insertCell(4);
    amountCell.innerHTML = `0.00`;
    amountCell.classList.add("amount");
    amountCell.style.textAlign = "right";
    amountCell.style.fontWeight = "bold";
    row.insertCell(5).innerHTML = `<button type="button" onclick="removeRow(this)" style="background:#dc3545; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">X</button>`;
    attachEvents(row);
    
    // Auto-focus the description field for quick entry
    row.querySelector('.description-input').focus();
}

function fillService(select) {
    let selected = select.options[select.selectedIndex];
    let row = select.closest("tr");
    if (selected.value) {
        row.querySelector(".unit-cost").value = selected.value;
        row.querySelector(".description-input").value = selected.getAttribute("data-desc");
        calculateRow(row);
    }
}

function calculateRow(row) {
    let unit = parseFloat(row.querySelector(".unit-cost").value) || 0;
    let qty = parseFloat(row.querySelector(".quantity").value) || 0;
    row.querySelector(".amount").innerText = (unit * qty).toFixed(2);
    calculateTotal();
}

function calculateTotal() {
    let total = 0;
    let items = [];
    document.querySelectorAll("#items-table tr").forEach((row, index) => {
        if (index === 0) return; // Skip header
        let descInput = row.querySelector(".description-input");
        let unitInput = row.querySelector(".unit-cost");
        let qtyInput = row.querySelector(".quantity");
        if (!descInput) return;
        let unit = parseFloat(unitInput.value) || 0;
        let qty = parseFloat(qtyInput.value) || 0;
        total += unit * qty;
        items.push({description: descInput.value, unit_cost: unit, quantity: qty});
    });
    document.getElementById("grand-total").innerText = total.toFixed(2);
    document.getElementById("items_data").value = JSON.stringify(items);
}

function attachEvents(row) {
    let unitInput = row.querySelector(".unit-cost");
    let qtyInput = row.querySelector(".quantity");
    if (unitInput) unitInput.addEventListener("input", () => calculateRow(row));
    if (qtyInput) qtyInput.addEventListener("input", () => calculateRow(row));
}

function removeRow(button) {
    button.closest("tr").remove();
    calculateTotal();
}

function validateAndSubmit() {
    if (!document.getElementById("client_id").value) {
        alert("Please select a client from the list");
        return false;
    }
    if (document.querySelectorAll("#items-table tr").length <= 1) {
        alert("Please add at least one item");
        return false;
    }
    calculateTotal();
    return true;
}

// Add first row automatically
addRow();
</script>
{% endblock %}
